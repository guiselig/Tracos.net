<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Traços</title>
  <script>
    // GitHub Pages SPA trick: salva o path e redireciona para a raiz
    // O index.html vai restaurar o path via history.replaceState
    sessionStorage.setItem('spa-path', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
